<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Найди клиентов без сайта</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f13; color: #e8e6e1; font-family: 'Inter', system-ui, sans-serif; }
    select option { background: #1a1a22; color: #e8e6e1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const CATEGORIES = [
      "Кафе и рестораны","Кофейни","Барбершопы и парикмахерские",
      "Салоны красоты","Автосервисы","Фитнес-клубы и спортзалы",
      "Стоматологии","Аптеки","Гостиницы и хостелы",
      "Магазины одежды","Цветочные магазины","Пиццерии",
    ];

    async function claudeRequest(messages, tools) {
      const body = { model: "claude-sonnet-4-6", max_tokens: 1000, messages };
      if (tools) body.tools = tools;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      return res.json();
    }

    function App() {
      const [category, setCategory] = useState(CATEGORIES[0]);
      const [city, setCity] = useState("Санкт-Петербург");
      const [businesses, setBusinesses] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadingStatus, setLoadingStatus] = useState("");
      const [error, setError] = useState("");
      const [selected, setSelected] = useState(null);
      const [message, setMessage] = useState("");
      const [generatingMsg, setGeneratingMsg] = useState(false);
      const [step, setStep] = useState("search");
      const [copied, setCopied] = useState(false);

      async function searchBusinesses() {
        if (!city.trim()) { setError("Введи город"); return; }
        setLoading(true); setError(""); setBusinesses([]);
        setLoadingStatus("Ищу заведения через веб-поиск...");
        try {
          const searchPrompt = `Найди 10-15 реальных заведений типа "${category}" в городе ${city}, у которых НЕТ собственного сайта (только 2ГИС, Яндекс Карты, соцсети — но не отдельный сайт).

Ответь ТОЛЬКО JSON массивом без пояснений и без markdown:
[{"name":"Название","address":"Адрес","phone":"Телефон или null","note":"Почему без сайта"}]

Если не можешь найти реальные данные — верни пустой массив [].`;

          const tools = [{ type: "web_search_20250305", name: "web_search" }];
          let messages = [{ role: "user", content: searchPrompt }];
          let data = await claudeRequest(messages, tools);

          let iterations = 0;
          while (data.stop_reason === "tool_use" && iterations < 5) {
            iterations++;
            setLoadingStatus(`Ищу в интернете... (шаг ${iterations})`);
            const assistantContent = data.content || [];
            messages = [
              ...messages,
              { role: "assistant", content: assistantContent },
              {
                role: "user",
                content: assistantContent
                  .filter(b => b.type === "tool_use")
                  .map(b => ({ type: "tool_result", tool_use_id: b.id, content: "Используй найденные данные для составления JSON списка." }))
              }
            ];
            data = await claudeRequest(messages, tools);
          }

          setLoadingStatus("Обрабатываю результаты...");
          const raw = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
          let parsed = [];
          try {
            const match = raw.match(/\[[\s\S]*\]/);
            if (match) parsed = JSON.parse(match[0]);
          } catch {}

          if (!Array.isArray(parsed) || parsed.length === 0) {
            setError("Не удалось найти заведения. Попробуй другую категорию или город.");
          } else {
            setBusinesses(parsed.map((b, i) => ({ ...b, id: i, rubric: category })));
            setStep("results");
          }
        } catch(e) { setError("Ошибка: " + e.message); }
        setLoading(false); setLoadingStatus("");
      }

      async function generateMessage(biz) {
        setSelected(biz); setMessage(""); setGeneratingMsg(true); setStep("message");
        try {
          const data = await claudeRequest([{ role: "user", content:
            `Ты — фрилансер-веб-разработчик. Напиши короткое живое холодное сообщение клиенту из города ${city}.
Данные: название: ${biz.name}, тип: ${biz.rubric}, адрес: ${biz.address}${biz.phone ? ", телефон: "+biz.phone : ""}${biz.note ? ", заметка: "+biz.note : ""}.
Требования: обращение на "вы", упомяни название и тип, объясни отсутствие сайта, предложи помощь (от 5000 руб), портфолио: kuhny123.github.io/portfolio/, заверши конкретным вопросом. 4-6 предложений, без смайлов. Только текст.`
          }]);
          const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
          setMessage(text.trim());
        } catch(e) { setMessage("Ошибка: " + e.message); }
        setGeneratingMsg(false);
      }

      function copyMessage() {
        navigator.clipboard.writeText(message);
        setCopied(true); setTimeout(()=>setCopied(false), 2000);
      }

      const inp = { width:"100%", padding:"10px 14px", background:"#0f0f13", border:"1px solid #2a2a35", borderRadius:8, color:"#e8e6e1", fontSize:14, outline:"none" };

      return (
        <div style={{ minHeight:"100vh", padding:"32px 16px" }}>
          <div style={{ maxWidth:680, margin:"0 auto" }}>

            <div style={{ marginBottom:36 }}>
              <div style={{ display:"inline-flex", alignItems:"center", gap:6, background:"#1a2a1a", border:"1px solid #2a4a2a", borderRadius:6, padding:"4px 12px", fontSize:11, color:"#6abf6a", letterSpacing:1.2, textTransform:"uppercase", marginBottom:12 }}>
                <span style={{ width:6, height:6, borderRadius:"50%", background:"#6abf6a", display:"inline-block" }} />
                Без регистрации · ИИ-поиск
              </div>
              <h1 style={{ fontSize:28, fontWeight:700, lineHeight:1.2 }}>
                Найди клиентов<br/><span style={{ color:"#6c63ff" }}>без сайта</span>
              </h1>
              <p style={{ color:"#888", marginTop:8, fontSize:14 }}>ИИ ищет заведения → фильтрует без сайта → пишет сообщение</p>
            </div>

            {step === "search" && (
              <div style={{ background:"#1a1a22", border:"1px solid #2a2a35", borderRadius:12, padding:24 }}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:16 }}>
                  <div>
                    <label style={{ fontSize:12, color:"#888", display:"block", marginBottom:6 }}>ГОРОД</label>
                    <input type="text" placeholder="Москва, Казань..." value={city}
                      onChange={e=>setCity(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&searchBusinesses()}
                      style={inp} />
                  </div>
                  <div>
                    <label style={{ fontSize:12, color:"#888", display:"block", marginBottom:6 }}>КАТЕГОРИЯ</label>
                    <select value={category} onChange={e=>setCategory(e.target.value)} style={inp}>
                      {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                </div>
                {error && <div style={{ background:"#ff444422", border:"1px solid #ff444444", borderRadius:8, padding:"10px 14px", fontSize:13, color:"#ff8080", marginBottom:16 }}>{error}</div>}
                <button onClick={searchBusinesses} disabled={loading}
                  style={{ width:"100%", padding:13, background:loading?"#3a3a4a":"#6c63ff", border:"none", borderRadius:8, color:"#fff", fontSize:15, fontWeight:600, cursor:loading?"not-allowed":"pointer" }}>
                  {loading ? loadingStatus||"Ищу..." : "Найти заведения без сайта"}
                </button>
                {loading && <div style={{ marginTop:12, fontSize:12, color:"#555", textAlign:"center" }}>Поиск занимает 15–30 секунд</div>}
                <div style={{ marginTop:14, padding:"10px 14px", background:"#12121a", borderRadius:8, fontSize:12, color:"#555" }}>
                  ИИ ищет через веб-поиск и находит заведения без сайта
                </div>
              </div>
            )}

            {step === "results" && (
              <div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                  <div><span style={{ color:"#6c63ff", fontWeight:700 }}>{businesses.length}</span><span style={{ color:"#888", fontSize:14 }}> заведений без сайта · {city}</span></div>
                  <button onClick={()=>{setStep("search");setBusinesses([]);}} style={{ background:"none", border:"1px solid #2a2a35", borderRadius:6, color:"#888", padding:"6px 12px", fontSize:13, cursor:"pointer" }}>← Назад</button>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {businesses.map(biz=>(
                    <div key={biz.id} style={{ background:"#1a1a22", border:"1px solid #2a2a35", borderRadius:10, padding:"14px 16px", display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12 }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontWeight:600, fontSize:15, marginBottom:3 }}>{biz.name}</div>
                        <div style={{ color:"#888", fontSize:12 }}>{biz.address}</div>
                        {biz.phone && <div style={{ color:"#6c63ff", fontSize:12, marginTop:2 }}>{biz.phone}</div>}
                        {biz.note && <div style={{ color:"#555", fontSize:11, marginTop:3, fontStyle:"italic" }}>{biz.note}</div>}
                      </div>
                      <button onClick={()=>generateMessage(biz)}
                        style={{ background:"#6c63ff", border:"none", borderRadius:7, color:"#fff", padding:"8px 14px", fontSize:13, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>Написать</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {step === "message" && (
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
                  <button onClick={()=>setStep("results")} style={{ background:"none", border:"1px solid #2a2a35", borderRadius:6, color:"#888", padding:"6px 12px", fontSize:13, cursor:"pointer" }}>← К списку</button>
                  <div>
                    <div style={{ fontWeight:600 }}>{selected?.name}</div>
                    <div style={{ fontSize:12, color:"#888" }}>{selected?.address}</div>
                  </div>
                </div>
                <div style={{ background:"#1a1a22", border:"1px solid #2a2a35", borderRadius:12, padding:20, marginBottom:14 }}>
                  <div style={{ fontSize:11, color:"#555", marginBottom:10, textTransform:"uppercase", letterSpacing:1 }}>Готовое сообщение</div>
                  {generatingMsg
                    ? <div style={{ color:"#6c63ff", fontSize:14 }}>Генерирую...</div>
                    : <div style={{ fontSize:15, lineHeight:1.75, whiteSpace:"pre-wrap" }}>{message}</div>}
                </div>
                {!generatingMsg && message && (
                  <div style={{ display:"flex", gap:10 }}>
                    <button onClick={copyMessage} style={{ flex:1, padding:12, background:copied?"#22c55e":"#6c63ff", border:"none", borderRadius:8, color:"#fff", fontSize:14, fontWeight:600, cursor:"pointer" }}>
                      {copied ? "✓ Скопировано" : "Скопировать"}
                    </button>
                    <button onClick={()=>generateMessage(selected)} style={{ padding:"12px 16px", background:"#1a1a22", border:"1px solid #2a2a35", borderRadius:8, color:"#888", fontSize:16, cursor:"pointer" }}>↻</button>
                  </div>
                )}
                {selected?.phone && (
                  <div style={{ marginTop:12, padding:"10px 14px", background:"#1a1a22", border:"1px solid #2a2a35", borderRadius:8, fontSize:13, color:"#888" }}>
                    Телефон: <span style={{ color:"#e8e6e1" }}>{selected.phone}</span>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
